name: "Sentry Triage — Slack Notification"

on:
  # Primary trigger: fires when the triage workflow finishes.
  # workflow_run is dispatched by GitHub infrastructure — it is NOT suppressed
  # by the GITHUB_TOKEN restriction that blocks pull_request events from bots.
  workflow_run:
    workflows: ["Sentry Crash Auto-Triage"]
    types: [completed]

  # Manual / programmatic fallback: pass PR details explicitly as inputs.
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Pull Request URL"
        required: true
      pr_title:
        description: "Pull Request title"
        required: true
      sentry_url:
        description: "Sentry issue URL (optional)"
        required: false
        default: ""
      issue_url:
        description: "GitHub Issue URL (optional)"
        required: false
        default: ""
      branch_ref:
        description: "Fix branch name (optional)"
        required: false
        default: ""

jobs:
  notify-slack:
    # workflow_run: only notify when the triage workflow actually succeeded.
    # workflow_dispatch: always run (caller decides when to invoke).
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Resolve PR details
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_URL: ${{ inputs.pr_url }}
          INPUT_PR_TITLE: ${{ inputs.pr_title }}
          INPUT_SENTRY_URL: ${{ inputs.sentry_url }}
          INPUT_ISSUE_URL: ${{ inputs.issue_url }}
          INPUT_BRANCH_REF: ${{ inputs.branch_ref }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # Inputs supplied directly — use them as-is.
            PR_URL="$INPUT_PR_URL"
            PR_TITLE="$INPUT_PR_TITLE"
            SENTRY_URL="$INPUT_SENTRY_URL"
            ISSUE_URL="$INPUT_ISSUE_URL"
            BRANCH_REF="$INPUT_BRANCH_REF"

          else
            # workflow_run: look up the most recent open fix/sentry- PR.
            # Branch prefix fix/sentry- is unique to the triage agent — no
            # author filter needed (bot login format varies across CLI versions).
            PR_JSON=$(gh pr list \
              --repo "$REPO" \
              --state open \
              --limit 50 \
              --json number,title,url,headRefName,body \
              --jq '[.[] | select(.headRefName | startswith("fix/sentry-"))]
                   | sort_by(.number) | last')

            if [[ -z "$PR_JSON" || "$PR_JSON" == "null" ]]; then
              echo "No matching fix/sentry- PR found — nothing to notify."
              exit 0
            fi

            PR_URL=$(echo "$PR_JSON"    | jq -r '.url')
            PR_TITLE=$(echo "$PR_JSON"  | jq -r '.title')
            PR_BODY=$(echo "$PR_JSON"   | jq -r '.body')
            BRANCH_REF=$(echo "$PR_JSON" | jq -r '.headRefName')

            # Extract Sentry URL from markdown link: [View crash](https://...sentry.io/...)
            SENTRY_URL=$(echo "$PR_BODY" | grep -oP '(?<=\()https://[^)]*sentry\.io[^)]*' | head -1)
            # Fallback: bare URL anywhere in the body
            if [[ -z "$SENTRY_URL" ]]; then
              SENTRY_URL=$(echo "$PR_BODY" | grep -oP 'https://[^\s)>"]*sentry\.io[^\s)>"]*' | head -1)
            fi

            # Extract GitHub issue number from "Closes #N"
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oP '(?i)closes\s+#\K[0-9]+' | head -1)
            if [[ -n "$ISSUE_NUM" ]]; then
              ISSUE_URL="https://github.com/${REPO}/issues/${ISSUE_NUM}"
            else
              ISSUE_URL=""
            fi
          fi

          echo "PR URL     : $PR_URL"
          echo "PR Title   : $PR_TITLE"
          echo "Sentry URL : $SENTRY_URL"
          echo "Issue URL  : $ISSUE_URL"
          echo "Branch     : $BRANCH_REF"

          echo "pr_url=$PR_URL"         >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE"     >> "$GITHUB_OUTPUT"
          echo "sentry_url=$SENTRY_URL" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL"   >> "$GITHUB_OUTPUT"
          echo "branch_ref=$BRANCH_REF" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: steps.resolve.outputs.pr_url != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_SENTRY_TRIAGE_WEBHOOK }}
          SENTRY_URL: ${{ steps.resolve.outputs.sentry_url }}
          ISSUE_URL: ${{ steps.resolve.outputs.issue_url }}
          PR_URL: ${{ steps.resolve.outputs.pr_url }}
          PR_TITLE: ${{ steps.resolve.outputs.pr_title }}
          BRANCH_REF: ${{ steps.resolve.outputs.branch_ref }}
        run: |
          # Strip " (Sentry auto-triage)" suffix for the header — keep it short
          DISPLAY_TITLE=$(echo "$PR_TITLE" | sed 's/ (Sentry auto-triage)//')

          # Build Slack payload using jq so values are safely escaped
          # Buttons are added conditionally based on URL availability
          PAYLOAD=$(jq -n \
            --arg display_title "$DISPLAY_TITLE" \
            --arg pr_title     "$PR_TITLE" \
            --arg pr_url       "$PR_URL" \
            --arg sentry_url   "$SENTRY_URL" \
            --arg issue_url    "$ISSUE_URL" \
            --arg branch_ref   "$BRANCH_REF" \
            '
            ([$sentry_url] | map(select(length > 0)) | length > 0) as $has_sentry |
            ([$issue_url]  | map(select(length > 0)) | length > 0) as $has_issue  |

            (if $has_sentry then [{
              "type": "button",
              "text": {"type": "plain_text", "text": "🔴 View in Sentry", "emoji": true},
              "url": $sentry_url,
              "style": "danger"
            }] else [] end) as $sentry_btn |

            [{
              "type": "button",
              "text": {"type": "plain_text", "text": "📋 Review Draft PR", "emoji": true},
              "url": $pr_url,
              "style": "primary"
            }] as $pr_btn |

            (if $has_issue then [{
              "type": "button",
              "text": {"type": "plain_text", "text": "🐛 GitHub Issue", "emoji": true},
              "url": $issue_url
            }] else [] end) as $issue_btn |

            {
              "text": ("🔴 " + $display_title),
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ("🔴 " + $display_title),
                    "emoji": true
                  }
                },
                {
                  "type": "context",
                  "elements": [{
                    "type": "mrkdwn",
                    "text": "A production crash was automatically triaged by GitHub Copilot. A draft fix PR has been opened and is awaiting human review."
                  }]
                },
                {"type": "divider"},
                {
                  "type": "actions",
                  "elements": ($sentry_btn + $pr_btn + $issue_btn)
                },
                {"type": "divider"},
                {
                  "type": "context",
                  "elements": [{
                    "type": "mrkdwn",
                    "text": ("⚠️ *Draft PR* — review and approve before merging. Do not merge directly.   Branch: `" + $branch_ref + "`")
                  }]
                }
              ]
            }
            ')

          HTTP_STATUS=$(curl -s -o /tmp/slack_response.txt -w "%{http_code}" \
            -X POST \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK")

          RESPONSE=$(cat /tmp/slack_response.txt)
          echo "Slack response: $RESPONSE (HTTP $HTTP_STATUS)"

          if [[ "$HTTP_STATUS" != "200" || "$RESPONSE" != "ok" ]]; then
            echo "::error::Slack notification failed — HTTP $HTTP_STATUS, body: $RESPONSE"
            exit 1
          fi

          echo "✅ Slack notification sent successfully."
